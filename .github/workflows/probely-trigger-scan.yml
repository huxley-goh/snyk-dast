name: Trigger Probely Scan

# Manually-triggered workflow that starts a Probely (Snyk API & Web) scan
# for a specific target, using the Python-based Probely CLI.
# Run it from the Actions tab → "Run workflow".
on:
  workflow_dispatch:
    inputs:
      target_id:
        description: "Probely target ID to scan"
        required: true
        type: string

permissions:
  contents: read

jobs:
  start-scan:
    name: Start scan for target
    runs-on: ubuntu-latest
    # Required so the job can read the "PROBELY_API_KEY" secret scoped to the
    # "staging" GitHub Environment.
    environment: staging
    env:
      # The Probely CLI reads this automatically for authentication.
      PROBELY_API_KEY: ${{ secrets.PROBELY_API_KEY }}
      TARGET_ID: ${{ inputs.target_id }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Probely CLI
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade probely
          echo "Installed Probely CLI: $(pip show probely | awk -F': ' '/^Version/ {print $2}')"

      - name: Validate inputs
        run: |
          missing=0
          [ -z "${PROBELY_API_KEY}" ] && { echo "::error::Secret PROBELY_API_KEY is not set."; missing=1; }
          [ -z "${TARGET_ID}" ]       && { echo "::error::Input target_id is required."; missing=1; }
          exit "$missing"

      - name: Start Probely scan
        id: scan
        run: |
          set -euo pipefail
          echo "Starting scan for target ${TARGET_ID} ..."
          scan_id="$(probely targets start-scan "${TARGET_ID}" -o IDS_ONLY)"
          if [ -z "${scan_id}" ]; then
            echo "::error::No scan id returned — check the target id and API key."
            exit 1
          fi
          echo "Started scan: ${scan_id}"
          echo "scan_id=${scan_id}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          {
            echo "## Probely scan started"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Target ID | \`${TARGET_ID}\` |"
            echo "| Scan ID | \`${{ steps.scan.outputs.scan_id }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
